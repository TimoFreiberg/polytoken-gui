[[permission]]
identifier = "allow-remote-commands"
description = "Allow the hub-served web client to manage remote connection profiles and drive connect/disconnect. Covers: list_remote_profiles, add_remote_profile, update_remote_profile, delete_remote_profile, connect_to_remote, disconnect_remote, remote_connection_state."
commands.allow = [
  "list_remote_profiles",
  "add_remote_profile",
  "update_remote_profile",
  "delete_remote_profile",
  "connect_to_remote",
  "disconnect_remote",
  "remote_connection_state",
]
