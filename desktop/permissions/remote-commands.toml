[[permission]]
identifier = "allow-remote-commands"
description = "Allow the hub-served web client to manage remote computer profiles and drive host connect/disconnect. Covers: list_remote_profiles, add_remote_profile, update_remote_profile, delete_remote_profile, ensure_remote_host, host_state, list_hosts, disconnect_host."
commands.allow = [
  "list_remote_profiles",
  "add_remote_profile",
  "update_remote_profile",
  "delete_remote_profile",
  "ensure_remote_host",
  "host_state",
  "list_hosts",
  "disconnect_host",
  "acknowledge_risk",
  "cancel_connection",
  "resume_connection",
]
