# CI — every PR and every push to main. Independent jobs:
#   web-check:   typechecks (protocol/scripts/e2e/parity/svelte) + unit tests.
#   web-e2e:     the Playwright e2e suite, sharded across isolated mock-driver
#                runners. Each shard boots its own dev server on auto-assigned ports.
#   desktop:     fmt + clippy for the Tauri shell, on macOS because that's the only
#                target the shell builds for. The hub sidecar must be compiled first —
#                tauri-build stages `externalBin` at compile time and errors if missing.
#   rust-server: fmt + clippy + tests for the Rust server port.
#
# The release pipeline (tag-triggered) hangs off these jobs via `needs`; see
# desktop/README.md "Publishing a release".

name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# A release lands as TWO push events for the same commit — refs/heads/main and the
# refs/tags/v* that release.ts pushes right after. Running tests twice buys nothing:
# the tag run is the one that gates the release job, so the test jobs skip the
# branch-push twin. The marker is release.ts's commit subject ("Release vX.Y.Z") —
# load-bearing coupling, noted on both sides. A hand-pushed release commit with a
# different subject just runs twice (the old behavior), never skips the release.
jobs:
  web-check:
    name: web — typecheck, unit
    if: github.ref_type == 'tag' || github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Release v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun test

  web-e2e:
    name: web — e2e (${{ matrix.shard }}/2)
    if: github.ref_type == 'tag' || github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Release v')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      # The Rust server is the only server now; e2e boots it via `cargo run`.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server-rs
      - run: cargo build
        working-directory: server-rs
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: bunx playwright install --with-deps chromium
      - run: bun run test:e2e -- --shard=${{ matrix.shard }}/2
      - name: Upload traces on e2e failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

  web-live:
    name: web — live e2e (fake daemon)
    # Corpus-backed live tier: the real Rust server (PANTOKEN_DRIVER=fake) over the
    # in-process fake daemon. Gated to manual
    # dispatch until the specs have a confirmed green run — they were authored
    # against the corpus + existing DOM selectors but not yet executed in a browser.
    # Promote to the pull_request/push gate (drop this `if:`) once a dispatch run
    # passes. This is the third leg of the cutover gate (see server-rs/PROGRESS.md).
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server-rs
      - run: bun install --frozen-lockfile
      # Pre-warm the Rust binary so dev.ts's `cargo run` answers /health quickly (the
      # webServer timeout budgets a cold compile, but warming keeps it comfortable).
      - run: cargo build
        working-directory: server-rs
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: bunx playwright install --with-deps chromium
      - run: bun run test:e2e:live
      - name: Upload traces on live e2e failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-live-results
          path: test-results/
          retention-days: 7

  desktop:
    name: desktop shell — fmt, clippy
    if: github.ref_type == 'tag' || github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Release v')
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      # tauri-build stages externalBin + resources at compile time; build-hub.ts also
      # ensures client/dist exists so the resource mapping never trips.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server-rs
      - run: bun scripts/desktop/build-hub.ts --debug
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop
      - run: cargo fmt --check
        working-directory: desktop
      - run: cargo clippy --locked --all-targets -- -D warnings
        working-directory: desktop

  rust-server:
    name: rust server — fmt, clippy, test
    if: github.ref_type == 'tag' || github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Release v')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server-rs
      - run: cargo fmt --check
        working-directory: server-rs
      - run: cargo clippy --locked --all-targets -- -D warnings
        working-directory: server-rs
      - run: cargo test
        working-directory: server-rs

  # Tag pushes only (scripts/desktop/release.ts creates them): prepare the signed
  # bundled .app in parallel with the gates, then publish only after those gates pass.
  # The minisign key comes from the TAURI_SIGNING_PRIVATE_KEY Actions secret
  # (one-time setup: gh secret set TAURI_SIGNING_PRIVATE_KEY < ~/.tauri/pantoken-shell.key).
  release-prepare:
    name: release — prepare signed app
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14 # arm64 → the darwin-aarch64 artifact installed apps expect
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server-rs
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop
      - name: Build signed release artifacts
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: >
          bun scripts/desktop/publish.ts
          --dry-run
          --repo ${{ github.repository }}
          --tag-must-match "${{ github.ref_name }}"
      - name: Upload signed release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-artifacts
          path: |
            desktop/target/release/bundle/macos/Pantoken.app/
            desktop/target/release/bundle/macos/Pantoken.app.tar.gz
            desktop/target/release/bundle/macos/Pantoken.app.tar.gz.sig
            desktop/target/release/bundle/macos/latest.json
          retention-days: 1

  release:
    name: release — publish
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [web-check, web-e2e, desktop, release-prepare]
    runs-on: macos-14 # publish.ts validates the macOS bundle with plutil
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Download signed release artifacts
        uses: actions/download-artifact@v4
        with:
          name: signed-release-artifacts
          path: desktop/target/release/bundle/macos
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: >
          bun scripts/desktop/publish.ts
          --skip-build
          --repo ${{ github.repository }}
          --tag-must-match "${{ github.ref_name }}"
