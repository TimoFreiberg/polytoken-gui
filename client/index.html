<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- interactive-widget=resizes-content: on supporting browsers (Chrome Android) the
         on-screen keyboard resizes the layout viewport, so 100dvh shrinks and the composer
         stays above it. iOS Safari ignores it and falls back to lib/keyboard-inset.ts. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#f7f6f2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="pantoken" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>pantoken</title>
    <script>
      // Pre-paint theme: resolve the persisted mode (lib/theme.ts owns the key) to a
      // concrete data-theme on <html> before the bundle loads, so an explicit override
      // — or OS dark for a "system" user — paints with no flash.
      try {
        var m = localStorage.getItem("pantoken.theme");
        if (m !== "light" && m !== "dark")
          m = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", m);
        // Pre-paint the status-bar/theme-color too (CSS tokens aren't loaded yet, so the
        // two --bg values are inlined; lib/theme.ts re-syncs from the computed token after
        // load and on every theme change).
        var tc = document.querySelector('meta[name="theme-color"]');
        if (tc) tc.setAttribute("content", m === "dark" ? "#242522" : "#f7f6f2");
        // Pre-paint the transcript text-size knob (lib/font-scale.ts owns the key) so a
        // zoomed-in reader doesn't see a reflow on load.
        var fs = parseFloat(localStorage.getItem("pantoken.fontScale"));
        if (fs >= 0.85 && fs <= 1.7)
          document.documentElement.style.setProperty("--font-scale", String(fs));
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
