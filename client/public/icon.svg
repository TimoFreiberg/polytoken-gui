<svg
  xmlns="http://www.w3.org/2000/svg"
  width="512"
  height="512"
  viewBox="0 0 512 512"
>
  <!-- Pantoken: a periwinkle pan / magnifying glass / Q holding a gold
       square-holed token. The token leads; the quieter pan and warm ink
       distinguish the mark from other luminous-blue developer-tool icons. -->
  <defs>
    <linearGradient
      id="background"
      x1="72"
      y1="58"
      x2="438"
      y2="456"
      gradientUnits="userSpaceOnUse"
    >
      <stop stop-color="#332b29" />
      <stop offset="1" stop-color="#19181b" />
    </linearGradient>
    <linearGradient
      id="pan"
      x1="105"
      y1="89"
      x2="436"
      y2="390"
      gradientUnits="userSpaceOnUse"
    >
      <stop stop-color="#828fe0" />
      <stop offset="1" stop-color="#5562b9" />
    </linearGradient>
    <linearGradient
      id="token"
      x1="153"
      y1="149"
      x2="316"
      y2="320"
      gradientUnits="userSpaceOnUse"
    >
      <stop stop-color="#f7ca61" />
      <stop offset="0.52" stop-color="#dfa431" />
      <stop offset="1" stop-color="#bf7d1c" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="115" fill="url(#background)" />

  <!-- The handle sits behind the bowl so the pan remains one clean silhouette. -->
  <g transform="rotate(30 232 236)">
    <rect x="350" y="207" width="154" height="58" rx="29" fill="url(#pan)" />
    <circle cx="477" cy="236" r="11" fill="url(#token)" />
    <circle cx="477" cy="236" r="5" fill="#1c1a1b" />
  </g>

  <!-- A slimmer ring lets the gold token become the first read at switcher size. -->
  <circle cx="232" cy="236" r="154" fill="url(#pan)" />
  <circle cx="232" cy="236" r="123" fill="#1c1a1b" />

  <rect
    x="153"
    y="157"
    width="158"
    height="158"
    rx="40"
    fill="url(#token)"
    transform="rotate(-7 232 236)"
  />
  <rect
    x="194"
    y="198"
    width="76"
    height="76"
    rx="17"
    fill="#1c1a1b"
    transform="rotate(-7 232 236)"
  />

  <!-- Broad, quiet highlights survive reduction without restoring the old gloss. -->
  <path
    d="M134 144a131 131 0 0 1 117-31"
    fill="none"
    stroke="#bcc4f6"
    stroke-width="8"
    stroke-linecap="round"
    opacity="0.31"
  />
  <path
    d="M182 184a74 74 0 0 1 64-17"
    fill="none"
    stroke="#ffe4a0"
    stroke-width="9"
    stroke-linecap="round"
    opacity="0.45"
  />
</svg>
