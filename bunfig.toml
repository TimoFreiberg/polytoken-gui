# bunfig.toml — supply-chain cooldown backbone for the pantoken monorepo.
# Bun enforces this on EVERY install in the workspace (one root lockfile).
# Project-local on purpose: Bun ignores a *global* bunfig for these keys
# (bun #28726), and the cooldown is what dodges fresh npm malware.

[install]
# Refuse to RESOLVE any package version published < 3 days ago. 3d (259200s)
# tops the dominant npm-malware detection band (most malicious versions are
# yanked within minutes–hours) and matches Renovate's default. Covers direct
# AND transitive deps at resolution time.
#   Knob: 302400 = 3.5d ("half a week"); 86400 = 1d floor.
#   Caveat: enforced only when versions are (re)resolved — a version already
#   pinned in bun.lock is NOT re-checked (bun #30525). That's fine: the cooldown
#   gates NEW picks; `bun audit` covers already-installed ones. It also means a
#   plain `bun install` / deploy honors the committed lockfile and is unaffected.
minimumReleaseAge = 259200
